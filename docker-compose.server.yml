services:
  grasp-fs-rcl-su:
    cpus: 2.00
    mem_limit: 2048m
    environment:
      JAVA_OPTS: "-Xms512m -Xmx1536m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom"
      SPRING_TASK_EXECUTION_POOL_CORE_SIZE: "3"
      SPRING_TASK_EXECUTION_POOL_MAX_SIZE: "6"
      SPRING_TASK_EXECUTION_POOL_QUEUE_CAPACITY: "150"

