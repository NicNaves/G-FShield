x-rcl-service: &rcl-service
  restart: unless-stopped
  cpus: 1.50
  mem_limit: 1536m

x-dls-service: &dls-service
  restart: unless-stopped
  cpus: 1.00
  mem_limit: 1536m

x-dls-environment: &dls-environment
  KAFKA_MAX_POLL_INTERVAL_MS: "14400000"

x-neighborhood-service: &neighborhood-service
  restart: unless-stopped
  cpus: 0.75
  mem_limit: 768m

services:
  grasp-fs-rcl-su:
    <<: *rcl-service
    build:
      context: ./grasp-fs-rcl-generator/Features Selection/Symmetrical Uncertainty/grasp-fs-rcl-su
    environment:
      JAVA_OPTS: "-Xms256m -Xmx1024m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom"
      SPRING_TASK_EXECUTION_POOL_CORE_SIZE: "2"
      SPRING_TASK_EXECUTION_POOL_MAX_SIZE: "4"
      SPRING_TASK_EXECUTION_POOL_QUEUE_CAPACITY: "80"
    ports:
      - "8087:8087"
    volumes:
      - dataset_volume:/datasets
      - metrics_volume:/metrics
    depends_on:
      kafka:
        condition: service_started
  grasp-fs-rcl-rf:
    <<: *rcl-service
    build:
      context: ./grasp-fs-rcl-generator/Features Selection/RelieF/grasp-fs-rcl-rf
    environment:
      JAVA_OPTS: "-Xms256m -Xmx1024m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom"
      SPRING_TASK_EXECUTION_POOL_CORE_SIZE: "2"
      SPRING_TASK_EXECUTION_POOL_MAX_SIZE: "4"
      SPRING_TASK_EXECUTION_POOL_QUEUE_CAPACITY: "80"
    ports:
      - "8086:8086"
    volumes:
      - dataset_volume:/datasets
      - metrics_volume:/metrics
    depends_on:
      kafka:
        condition: service_started
  grasp-fs-rcl-ig:
    <<: *rcl-service
    build:
      context: ./grasp-fs-rcl-generator/Features Selection/InfoGain/grasp-fs-rcl-ig
    environment:
      JAVA_OPTS: "-Xms256m -Xmx1024m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom"
      SPRING_TASK_EXECUTION_POOL_CORE_SIZE: "2"
      SPRING_TASK_EXECUTION_POOL_MAX_SIZE: "4"
      SPRING_TASK_EXECUTION_POOL_QUEUE_CAPACITY: "80"
    ports:
      - "8089:8089"
    volumes:
      - dataset_volume:/datasets
      - metrics_volume:/metrics
    depends_on:
      kafka:
        condition: service_started
  grasp-fs-rcl-gr:
    <<: *rcl-service
    build:
      context: ./grasp-fs-rcl-generator/Features Selection/GainRatio/grasp-fs-rcl-gr
    environment:
      JAVA_OPTS: "-Xms256m -Xmx1024m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom"
      SPRING_TASK_EXECUTION_POOL_CORE_SIZE: "2"
      SPRING_TASK_EXECUTION_POOL_MAX_SIZE: "4"
      SPRING_TASK_EXECUTION_POOL_QUEUE_CAPACITY: "80"
    ports:
      - "8088:8088"
    volumes:
      - dataset_volume:/datasets
      - metrics_volume:/metrics
    depends_on:
      kafka:
        condition: service_started
  grasp-fs.dls.verify:
    <<: *neighborhood-service
    build:
      context: ./grasp-fs-distributed-ls/Verify/grasp-fs.dls.verify
    environment:
      JAVA_OPTS: "-Xms128m -Xmx512m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom"
      KAFKA_LISTENER_CONCURRENCY: "1"
    ports:
      - "8085:8085"
    volumes:
      - dataset_volume:/datasets
      - metrics_volume:/metrics
    depends_on:
      kafka:
        condition: service_started
  grasp-fs-dls-bf:
    <<: *dls-service
    build:
      context: ./grasp-fs-distributed-ls/Local Search/BitFlip/grasp-fs-dls-bf
    environment:
      <<: *dls-environment
      JAVA_OPTS: "-Xms256m -Xmx1024m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom"
      KAFKA_LISTENER_CONCURRENCY: "1"
    ports:
      - "8082:8082"
    volumes:
      - dataset_volume:/datasets
      - metrics_volume:/metrics
    depends_on:
      kafka:
        condition: service_started
  grasp-fs-dls-iw:
    <<: *dls-service
    build:
      context: ./grasp-fs-distributed-ls/Local Search/IWSS/grasp-fs-dls-iw
    environment:
      <<: *dls-environment
      JAVA_OPTS: "-Xms256m -Xmx1024m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom"
      KAFKA_LISTENER_CONCURRENCY: "1"
    ports:
      - "8083:8083"
    volumes:
      - dataset_volume:/datasets
      - metrics_volume:/metrics
    depends_on:
      kafka:
        condition: service_started
  grasp-fs-dls-iwr:
    <<: *dls-service
    build:
      context: ./grasp-fs-distributed-ls/Local Search/IWSSR/grasp-fs-dls-iwr
    environment:
      <<: *dls-environment
      JAVA_OPTS: "-Xms256m -Xmx1024m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom"
      KAFKA_LISTENER_CONCURRENCY: "1"
    ports:
      - "8084:8084"
    volumes:
      - dataset_volume:/datasets
      - metrics_volume:/metrics
    depends_on:
      kafka:
        condition: service_started
  grasp-fs-dls-rvnd:
    <<: *neighborhood-service
    build:
      context: ./grasp-fs-distributed-ls/Neighborhood/RVND/grasp-fs-dls-rvnd
    environment:
      JAVA_OPTS: "-Xms128m -Xmx512m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom"
      KAFKA_LISTENER_CONCURRENCY: "1"
    ports:
      - "8090:8090"
    volumes:
      - dataset_volume:/datasets
      - metrics_volume:/metrics
    depends_on:
      kafka:
        condition: service_started
  grasp-fs-dls-vnd:
    <<: *neighborhood-service
    build:
      context: ./grasp-fs-distributed-ls/Neighborhood/VND/grasp-fs-dls-vnd
    environment:
      JAVA_OPTS: "-Xms128m -Xmx512m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom"
      KAFKA_LISTENER_CONCURRENCY: "1"
    ports:
      - "8091:8091"
    volumes:
      - dataset_volume:/datasets
      - metrics_volume:/metrics
    depends_on:
      kafka:
        condition: service_started
  zookeeper:
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 256m
    image: 'confluentinc/cp-zookeeper:7.4.0'
    ports:
      - '2181:2181'
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000

  kafka:
    restart: unless-stopped
    cpus: 1.00
    mem_limit: 1024m
    image: 'confluentinc/cp-kafka:7.4.0'
    ports:
      - '19092:9092'
      - '29092:29092'
      - '9999:9999'
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:19092,PLAINTEXT_INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT_INTERNAL
      - KAFKA_NUM_PARTITIONS=6
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_JMX_PORT=9999
      - KAFKA_JMX_HOSTNAME=localhost
    depends_on:
      - zookeeper

  kafbat-ui:
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 512m
    image: ghcr.io/kafbat/kafka-ui:v1.4.2
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local-kafka"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
    depends_on:
      kafka:
        condition: service_started

volumes:
  dataset_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./datasets
  metrics_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./metrics
