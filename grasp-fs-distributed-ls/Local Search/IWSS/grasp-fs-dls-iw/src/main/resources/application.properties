#Server port config
server.port = 8083

#kafka config
spring.kafka.bootstrap-servers = kafka:29092
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:grasp-fs-dls-iw-group}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:latest}
spring.kafka.consumer.max-poll-interval-ms=${KAFKA_MAX_POLL_INTERVAL_MS:1800000}
spring.kafka.consumer.max-poll-records=${KAFKA_MAX_POLL_RECORDS:1}
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.producer.key-serializer: org.apache.kafka.common.serialization.StringSerializer
app.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.key-deserializer =org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class =org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.producer.properties.spring.json.type.mapping=br.com.graspfsdlsvnd.dto.DataSolution,br.com.graspfs.ls.bf.dto.DataSolution

kafka.listener.concurrency=${KAFKA_LISTENER_CONCURRENCY:1}


datasets.base.path=/datasets/

iwss.metrics.file=/metrics/IWSS_METRICS.csv
local.search.progress.mode=full
local.search.progress.every-n=1
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
spring.application.name=grasp-fs-dls-iw
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}","level":"%p","service":"${spring.application.name}","thread":"%thread","logger":"%logger{36}","message":"%msg"}%n
