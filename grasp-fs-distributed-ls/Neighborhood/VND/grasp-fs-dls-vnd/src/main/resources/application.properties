# Server config
server.port=8091

#Kafka config
spring.kafka.bootstrap-servers = kafka:29092
spring.kafka.consumer.group-id= VND
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.producer.key-serializer: org.apache.kafka.common.serialization.StringSerializer
app.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.producer.properties.spring.json.type.mapping=br.com.graspfsdlsvnd.dto.DataSolution,br.com.graspfs.ls.bf.dto.DataSolution
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

kafka.listener.concurrency=${KAFKA_LISTENER_CONCURRENCY:1}


vnd.max.iterations=${VND_MAX_ITERATIONS:10}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
spring.application.name=grasp-fs-dls-vnd
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}","level":"%p","service":"${spring.application.name}","thread":"%thread","logger":"%logger{36}","message":"%msg"}%n
