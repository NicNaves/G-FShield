services:
  g-fshield-postgres:
    cpus: 0.50
    mem_limit: 512m
    image: postgres:14
    container_name: g-fshield-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: g-fshield
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - g-fshield-webservice-api-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d g-fshield"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  g-fshield-webservice-api-pg-data:
